<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Organization Group</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="popup-body">
<div class="popup-titlebar">
  <span>&#9656; Organization Group</span>
  <a href="javascript:window.close()">Close</a>
</div>

<form method="get" action="{{ url_for('popup_groups') }}" class="popup-filters">
  <input type="hidden" name="token" value="{{ token }}">
  <label for="show">Show:</label> <input type="text" id="show" size="3" disabled>row(s)
  <label for="name">Name:</label> <input type="text" name="name" id="name" value="{{ name_q }}">
  <label for="description">Description:</label> <input type="text" name="description" id="description" value="{{ desc_q }}">
  <button type="submit" class="btn-primary">Search</button>
  <a class="btn-secondary" href="{{ url_for('popup_groups', token=token) }}">Clear</a>
</form>

<table class="grid popup-grid">
  <tr><th>Name</th><th>Description</th></tr>
  {% for g in results %}
  <tr class="pick-row" data-group-name="{{ g.name }}">
    <td>{{ g.name }}</td><td>{{ g.description }}</td>
  </tr>
  {% else %}
  <tr><td colspan="2">No groups found.</td></tr>
  {% endfor %}
</table>

<script>
function selectGroup(name) {
  if (window.opener && !window.opener.closed) {
    var doc = window.opener.document;
    var el = doc.getElementById('organization_group');
    if (el) {
      el.value = name;
      el.dispatchEvent(new Event('input', {bubbles: true}));
      el.dispatchEvent(new Event('change', {bubbles: true}));
    }
    var display = doc.getElementById('group_name_display');
    if (display) { display.value = name; }
  }
  window.close();
}

document.querySelectorAll('tr.pick-row').forEach(function (row) {
  row.addEventListener('click', function () {
    selectGroup(row.dataset.groupName);
  });
});
</script>
</body>
</html>
